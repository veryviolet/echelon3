name: publish to PyPI

# Trusted Publishing (OIDC) — no long-lived API tokens stored anywhere.
# Requires a one-time setup on PyPI side:
#   pypi.org -> Manage -> Account -> Publishing -> Add a new pending publisher
#     project:     echelon3
#     owner:       veryviolet
#     repository:  echelon3
#     workflow:    publish.yml
#     environment: pypi
#
# After that, pushing any vX.Y.Z tag triggers this workflow and publishes
# the matching wheel + sdist to https://pypi.org/project/echelon3/.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # required for OIDC trust exchange

jobs:
  build-and-publish:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: set up python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install uv
        run: pip install --quiet uv

      - name: verify tag matches package version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          tag="${REF_NAME#v}"
          ver="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag does not match pyproject version"
            exit 1
          fi

      - name: build wheel + sdist
        run: uv build

      - name: smoke install + CLI entry points
        run: |
          set -e
          uv venv .venv-test --python 3.12 --seed
          .venv-test/bin/pip install --quiet torch torchvision \
            --index-url https://download.pytorch.org/whl/cpu
          .venv-test/bin/pip install --quiet dist/*.whl
          .venv-test/bin/echelon3-train --help > /dev/null
          .venv-test/bin/echelon3-evaluate --help > /dev/null
          .venv-test/bin/echelon3-run --help > /dev/null

      - name: publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
